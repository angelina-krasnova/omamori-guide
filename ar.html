        auto-init="false"
        ios-camera-permission="true"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <!-- Кнопка назад -->
    <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
        <a href="javascript:history.back()" style="background: rgba(0,0,0,0.6); color: white; padding: 10px 15px; border-radius: 30px; text-decoration: none; font-family: sans-serif;">← Назад</a>
    </div>
    
    <a-scene
        webar-scene="key: 5a6fae75-8b69-408c-bfc7-bfceda58967d"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        loading-screen="enabled: false">

        <a-camera webar-camera></a-camera>

        <a-assets>
            <a-asset-item id="model" src=""></a-asset-item>
        </a-assets>

        <a-light type="ambient" color="#ffffff"></a-light>

        <a-entity webar-stage>
            <a-entity webar-ux-control="stageCursorUX: true; userGestureRotation: true; userGestureScale: true;">
                <a-entity gltf-model="#model" 
                    id="arModel"
                    rotation="0 0 0" 
                    position="0 0 0" 
                    webar-loadmonitor="elType: glb">
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
    const creatureId = new URLSearchParams(window.location.search).get('id');
    
    if (creatureId) {
        fetch('data/creatures.json')
            .then(response => response.json())
            .then(data => {
                const creature = data.creatures.find(c => c.id === creatureId);
                if (creature) {
                    document.getElementById('model').setAttribute('src', `aframe/models/${creature.id}.glb`);
                    document.title = `${creature.name} в AR | Omamori Guide`;
                    
                    // Берём scale из JSON
                    const arModel = document.getElementById('arModel');
                    const scaleVal = creature.scale;
                    arModel.setAttribute('scale', `${scaleVal} ${scaleVal} ${scaleVal}`);
                }
            })
            .catch(error => console.error('Ошибка:', error));
    }
    
    WEBARSDK.Init();
</script>

</body>
</html>
