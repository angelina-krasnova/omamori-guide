<!-- шаблон для просмотра модельки, в целом только для локального тестирования -->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>AR гид по японской мифологии</title>

    <script src="https://ar-libs.blippar.com/aframe/1.3.0/aframe-v1.3.0.min.js"></script>
    <script src="../webar-sdk/webar-sdk-2.1.0.min.js"
      webar-mode="surface-tracking"
      auto-init="false"
      ios-camera-permission="true"></script>
  </head>

  <body>  
    <a-scene
      webar-scene="key: ec3501ee-7bb8-4cd3-a7bd-79baa3cc09f1"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      loading-screen="enabled: false">

      <a-camera webar-camera></a-camera>

      <a-assets>
        <a-asset-item id="model" src="models/kitsune.glb"></a-asset-item>
      </a-assets>

      <a-light type="ambient" color="#ffffff"></a-light>

      <a-entity webar-stage>
        <a-entity webar-ux-control="stageCursorUX: true; userGestureRotation: true; userGestureScale: true;">
          <a-entity gltf-model="#model" 
            id="arModel"
            rotation="0 0 0" 
            position="0 0 0" 
            scale="0.25 0.25 0.25"
            webar-loadmonitor="elType: glb">
          </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      WEBARSDK.Init();
    </script>
  </body>
</html>
